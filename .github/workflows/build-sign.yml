name: Secure Build, Push and Sign Docker Images
on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  secure-release:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - auth-service
          - product-service
          - frontend-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set lowercase owner
        id: vars
        run: echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Install cosign
        uses: sigstore/cosign-installer@v3.8.1

      - name: Build local image
        env:
          IMAGE_SHA: ghcr.io/${{ steps.vars.outputs.owner_lc }}/${{ matrix.service }}:${{ github.sha }}
          IMAGE_LATEST: ghcr.io/${{ steps.vars.outputs.owner_lc }}/${{ matrix.service }}:latest
        run: |
          docker build -t "$IMAGE_SHA" -t "$IMAGE_LATEST" ./${{ matrix.service }}

      - name: Trivy scan (HIGH,CRITICAL)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ghcr.io/${{ steps.vars.outputs.owner_lc }}/${{ matrix.service }}:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Push images
        env:
          IMAGE_SHA: ghcr.io/${{ steps.vars.outputs.owner_lc }}/${{ matrix.service }}:${{ github.sha }}
          IMAGE_LATEST: ghcr.io/${{ steps.vars.outputs.owner_lc }}/${{ matrix.service }}:latest
        run: |
          docker push "$IMAGE_SHA"
          docker push "$IMAGE_LATEST"

      - name: Sign images
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          IMAGE_SHA: ghcr.io/${{ steps.vars.outputs.owner_lc }}/${{ matrix.service }}:${{ github.sha }}
          IMAGE_LATEST: ghcr.io/${{ steps.vars.outputs.owner_lc }}/${{ matrix.service }}:latest
        run: |
          cosign sign --yes --key env://COSIGN_PRIVATE_KEY "$IMAGE_SHA"
          cosign sign --yes --key env://COSIGN_PRIVATE_KEY "$IMAGE_LATEST"

      - name: Verify signatures (optional)
        env:
          COSIGN_PUBLIC_KEY: ${{ secrets.COSIGN_PUBLIC_KEY }}
          IMAGE_SHA: ghcr.io/${{ steps.vars.outputs.owner_lc }}/${{ matrix.service }}:${{ github.sha }}
          IMAGE_LATEST: ghcr.io/${{ steps.vars.outputs.owner_lc }}/${{ matrix.service }}:latest
        run: |
          if [ -z "$COSIGN_PUBLIC_KEY" ]; then
            echo "COSIGN_PUBLIC_KEY is not configured; skipping signature verification."
            exit 0
          fi
          cosign verify --key env://COSIGN_PUBLIC_KEY "$IMAGE_SHA"
          cosign verify --key env://COSIGN_PUBLIC_KEY "$IMAGE_LATEST"