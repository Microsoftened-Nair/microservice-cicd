name: CD

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy-frontend-pages:
    name: Deploy Frontend to GitHub Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate runtime frontend config
        run: |
          cat > frontend-service/public/js/config.js <<'EOF'
          window.APP_CONFIG = {
            AUTH_API: '${{ vars.AUTH_API_URL || 'http://localhost:5001' }}',
            PRODUCT_API: '${{ vars.PRODUCT_API_URL || 'http://localhost:5002' }}'
          };
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend-service/public

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
