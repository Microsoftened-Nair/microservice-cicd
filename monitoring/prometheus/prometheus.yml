global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: ecommerce-services
    metrics_path: /metrics
    static_configs:
      - targets:
          - auth-service:5001
        labels:
          service: auth-service
      - targets:
          - product-service:5002
        labels:
          service: product-service
      - targets:
          - frontend-service:3000
        labels:
          service: frontend-service
