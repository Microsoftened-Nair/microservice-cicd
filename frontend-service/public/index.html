<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce - Products</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">MicroStore</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarText">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarText">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" href="index.html">Products</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="orders.html">My Orders</a>
                    </li>
                </ul>
                <span class="navbar-text me-3" id="username-display"></span>
                <button onclick="logout()" class="btn btn-outline-light btn-sm">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <h2 class="mb-4">Products</h2>
        
        <!-- Add Product Form (Simple for demo) -->
        <div class="card mb-4 p-3 bg-light">
            <h5>Add New Product</h5>
            <form id="addProductForm" class="row g-3">
                <div class="col-md-3">
                    <input type="text" class="form-control" id="prodName" placeholder="Name" required>
                </div>
                <div class="col-md-2">
                    <input type="number" class="form-control" id="prodPrice" placeholder="Price" required>
                </div>
                <div class="col-md-5">
                    <input type="text" class="form-control" id="prodDesc" placeholder="Description">
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-success w-100">Add</button>
                </div>
            </form>
        </div>

        <div id="products-list" class="row row-cols-1 row-cols-md-3 g-4">
            <!-- Products will be loaded here -->
            <div class="col text-center py-5"><div class="spinner-border" role="status"></div></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        checkAuth();

        async function loadProducts() {
            try {
                const res = await fetch(`${PRODUCT_API}/products`);
                const products = await res.json();
                const list = document.getElementById('products-list');
                list.innerHTML = '';

                if (products.length === 0) {
                    list.innerHTML = '<div class="col-12 text-center">No products found. Add one above!</div>';
                    return;
                }

                products.forEach(p => {
                    const col = document.createElement('div');
                    col.className = 'col';
                    col.innerHTML = `
                        <div class="card h-100">
                            <div class="card-body">
                                <h5 class="card-title">${p.name}</h5>
                                <h6 class="card-subtitle mb-2 text-muted">$${p.price}</h6>
                                <p class="card-text">${p.description || ''}</p>
                            </div>
                            <div class="card-footer bg-transparent border-top-0">
                                <button onclick="buyProduct('${p._id}')" class="btn btn-primary w-100">Buy Now</button>
                            </div>
                        </div>
                    `;
                    list.appendChild(col);
                });
            } catch (err) {
                console.error(err);
                document.getElementById('products-list').innerHTML = '<div class="alert alert-danger">Failed to load products. Check console.</div>';
            }
        }

        async function buyProduct(productId) {
            const userId = localStorage.getItem('userId');
            if (!userId) return logout();

            if (!confirm('Place order for this item?')) return;

            try {
                const res = await fetch(`${PRODUCT_API}/orders`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId,
                        productId,
                        quantity: 1
                    })
                });
                const data = await res.json();
                if (res.ok) {
                    alert('Order placed successfully!');
                    window.location.href = 'orders.html';
                } else {
                    alert('Error: ' + data.message);
                }
            } catch (err) {
                console.error(err);
                alert('Error placing order');
            }
        }

        document.getElementById('addProductForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('prodName').value;
            const price = document.getElementById('prodPrice').value;
            const description = document.getElementById('prodDesc').value;

            try {
                const res = await fetch(`${PRODUCT_API}/products`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, price, description })
                });
                if (res.ok) {
                    document.getElementById('addProductForm').reset();
                    loadProducts();
                } else {
                    alert('Failed to add product');
                }
            } catch (err) {
                console.error(err);
            }
        });

        loadProducts();
    </script>
</body>
</html>
