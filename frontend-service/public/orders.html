<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce - My Orders</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="index.html">MicroStore</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarText">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarText">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Products</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="orders.html">My Orders</a>
                    </li>
                </ul>
                <span class="navbar-text me-3" id="username-display"></span>
                <button onclick="logout()" class="btn btn-outline-light btn-sm">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <h2 class="mb-4">My Orders</h2>
        
        <div class="table-responsive">
            <table class="table table-striped table-hover">
                <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>Product</th>
                        <th>Quantity</th>
                        <th>Total Price</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody id="orders-list">
                    <tr><td colspan="5" class="text-center">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        checkAuth();

        async function loadOrders() {
            const userId = localStorage.getItem('userId');
            if (!userId) return logout();

            try {
                const res = await fetch(`${PRODUCT_API}/orders?userId=${userId}`);
                const orders = await res.json();
                const list = document.getElementById('orders-list');
                list.innerHTML = '';

                if (orders.length === 0) {
                    list.innerHTML = '<tr><td colspan="5" class="text-center">No orders found.</td></tr>';
                    return;
                }

                orders.forEach(o => {
                    const row = document.createElement('tr');
                    const date = new Date(o.createdAt).toLocaleDateString() + ' ' + new Date(o.createdAt).toLocaleTimeString();
                    row.innerHTML = `
                        <td><small class="text-muted">${o._id}</small></td>
                        <td>${o.productName || 'Unknown Product'}</td>
                        <td>${o.quantity}</td>
                        <td>$${o.totalPrice}</td>
                        <td>${date}</td>
                    `;
                    list.appendChild(row);
                });
            } catch (err) {
                console.error(err);
                document.getElementById('orders-list').innerHTML = '<tr><td colspan="5" class="text-center text-danger">Failed to load orders.</td></tr>';
            }
        }

        loadOrders();
    </script>
</body>
</html>
